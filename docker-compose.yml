x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    APP_URL: ${APP_URL}
    DB_CONNECTION: ${DB_CONNECTION}
    DB_HOST: ${DB_HOST}
    DB_PORT: ${DB_PORT}
    DB_DATABASE: ${DB_DATABASE}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}
    CACHE_STORE: ${CACHE_STORE}
    QUEUE_CONNECTION: ${QUEUE_CONNECTION}
    SESSION_DRIVER: ${SESSION_DRIVER}
  working_dir: /var/www/html
  volumes:
    - ./:/var/www/html
    - vendor_data:/var/www/html/vendor
    - node_modules_data:/var/www/html/node_modules
  depends_on:
    mysql:
      condition: service_healthy
  restart: unless-stopped

services:
  app:
    <<: *laravel-service

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "3308:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8085:80"
    restart: unless-stopped

  worker:
    <<: *laravel-service
    profiles:
      - async
    command: sh -lc "until php artisan migrate:status >/dev/null 2>&1; do sleep 5; done; php artisan queue:work --tries=1 --sleep=3 --timeout=90"

  scheduler:
    <<: *laravel-service
    profiles:
      - async
    command: sh -lc "until php artisan migrate:status >/dev/null 2>&1; do sleep 5; done; php artisan schedule:work"

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
